<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Santa Fe Utility - Repayment Script</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --sf-teal:#007a8d; --muted:#6c757d; --border:#ececec; }
    body { font-family: "Segoe UI", Arial, sans-serif; background:#fafafa; color:#222; margin:20px; }
    .panel{ max-width:900px; margin:0 auto; background:#fff; border:1px solid var(--border); border-radius:8px; padding:18px;}
    .header{ display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid var(--sf-teal); padding-bottom:10px; margin-bottom:16px; }
    .title{ font-size:20px; color:var(--sf-teal); margin:0; }
    .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:12px; }
    .card{ background:#fff; border:1px solid #f4f4f4; padding:12px; border-radius:6px; }
    .label{ font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; }
    .value{ font-size:16px; font-weight:800; margin-top:6px; }
    .actions{ margin-top:14px; display:flex; gap:10px; }
    .btn{ padding:10px 14px; background:var(--sf-teal); color:#fff; text-decoration:none; border-radius:6px; font-weight:700; }
    .btn.secondary{ background:#f7f7f7; color:#333; border:1px solid #ddd; }
    .small{ color:var(--muted); font-size:13px; }
    @media (max-width:900px) { .grid{ grid-template-columns:1fr 1fr; } }
    @media (max-width:500px) { .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <h1 class="title">Repayment Plan Details</h1>
      <div id="status" class="small">Loading…</div>
    </div>

    <div class="grid">
      <div class="card"><div class="label">Customer</div><div id="d-name" class="value">—</div></div>
      <div class="card"><div class="label">Account</div><div id="d-acc" class="value">—</div></div>
      <div class="card"><div class="label">Balance</div><div id="d-bal" class="value">$0.00</div></div>
      <div class="card"><div class="label">Status</div><div id="d-status" class="value">—</div></div>

      <div class="card"><div class="label">Months</div><div id="d-months" class="value">—</div></div>
      <div class="card"><div class="label">Down Payment</div><div id="d-down" class="value">—</div></div>
      <div class="card"><div class="label">Monthly Payment</div><div id="d-monthly" class="value">—</div></div>
      <div class="card"><div class="label">Confirm #</div><div id="d-conf" class="value">—</div></div>
    </div>

    <div class="actions">
      <a id="btn-back" class="btn secondary">Back to Account</a>
      <a id="btn-edit" class="btn">Open in Agent Script</a>
      <div style="flex:1"></div>
      <div class="small">Data source: accounts.json (GitHub)</div>
    </div>
  </div>

  <script>
    (async function(){
      const dataUrl = '/Demo-Scripts/data-actions/accounts.json';
      const params = new URLSearchParams(window.location.search);
      const acct = (params.get('accountNumber') || '').trim();

      const set = (id, text)=>{ const el=document.getElementById(id); if(el) el.innerText = text ?? '—'; };
      const currency = (v) => {
        if(!v) return '—';
        const n = Number(String(v).replace(/[^0-9.-]/g,''));
        return isNaN(n) ? String(v) : n.toLocaleString(undefined,{style:'currency',currency:'USD'});
      };

      try {
        const res = await fetch(dataUrl);
        if(!res.ok) throw new Error('Fetch failed '+res.status);
        const all = await res.json();

        set('status','Loaded');

        if(!acct){
          set('d-name','No account number');
          return;
        }

        const record = all[acct] || {};

        // Allow URL overrides (AVA may pass repayment fields later). Prefer URL param if present.
        const urlOrRec = (name) => {
          if(params.has(name) && params.get(name) !== null && params.get(name) !== '') return params.get(name);
          return record[name] || record[name.charAt(0).toLowerCase() + name.slice(1)] || '';
        };

        // Populate display fields
        set('d-name', urlOrRec('customerName') || '—');
        set('d-acc', acct);
        set('d-bal', currency(urlOrRec('currentBalance') || urlOrRec('balance')));
        set('d-status', urlOrRec('repaymentPlanStatus') || 'None');

        // Repayment-specific fields (these may be empty initially)
        const months = urlOrRec('repaymentMonths') || urlOrRec('repaymentMonths');
        const down = urlOrRec('repaymentDownPayment') || urlOrRec('repaymentDownPayment');
        const monthly = urlOrRec('repaymentMonthlyPayment') || urlOrRec('repaymentMonthlyPayment');
        const conf = urlOrRec('repaymentConfirmationNumber') || urlOrRec('repaymentConfirmationNumber');

        set('d-months', months || '—');
        set('d-down', down ? currency(down) : '—');
        set('d-monthly', monthly ? currency(monthly) : '—');
        set('d-conf', conf || '—');

        // Back button returns to agent script preserving accountNumber
        const backUrl = 'agent-script.html?accountNumber=' + encodeURIComponent(acct);
        document.getElementById('btn-back').href = backUrl;
        document.getElementById('btn-edit').href = backUrl;

      } catch (err) {
        console.error(err);
        set('status','Error loading data');
      }
    })();
  </script>
</body>
</html>
