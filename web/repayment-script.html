<script>
  const P = Object.fromEntries(new URLSearchParams(window.location.search));
  const g = (k) => P[k] || '';
  const accountId = () => g('accountNumber') || g('key') || '';
  const isTrue = (k) => String(g(k)).trim().toLowerCase() === 'true';
  const normStatus = () => String(g('accountStatus')).trim().toLowerCase().replace(/\s+/g, '');
  const money = (k) => {
    const raw = String(g(k)).replace(/[$,]/g, '').trim();
    const n = parseFloat(raw);
    return Number.isFinite(n) ? '$' + n.toFixed(2) : '—';
  };
  const d = (k, fmt) => {
    const v = g(k);
    if (!v) return '—';
    if (fmt === '$') return money(k);
    return v;
  };
  function qs() { return new URLSearchParams(P).toString(); }

  document.getElementById('nav-agent').href = 'agent-script.html?' + qs();
  document.getElementById('nav-repayment').href = 'repayment-script.html?' + qs();
  document.getElementById('nav-payment').href = 'take-payment.html?' + qs();
  document.getElementById('btn-agent').href = 'agent-script.html?' + qs();
  document.getElementById('btn-payment').href = 'take-payment.html?' + qs();

  document.getElementById('heroBalance').textContent = d('currentBalance', '$');
  document.getElementById('heroAcct').textContent = accountId() || '—';
  document.getElementById('heroName').textContent = d('customerName');

  const status = normStatus();
  const statusEl = document.getElementById('heroStatus');
  if (status === 'finalnotice') { statusEl.className = 'badge badge-danger'; statusEl.textContent = 'Final Notice'; }
  else if (status === 'pastdue') { statusEl.className = 'badge badge-warn'; statusEl.textContent = 'Past Due'; }
  else if (status === 'disconnected') { statusEl.className = 'badge badge-danger'; statusEl.textContent = 'Disconnected'; }
  else if (status === 'active') { statusEl.className = 'badge badge-safe'; statusEl.textContent = 'Active'; }
  else { statusEl.className = 'badge badge-info'; statusEl.textContent = status || '—'; }

  const agStat = g('agreementStatus');
  const agStatDisplay = agStat === 'NOT_SENT' ? 'Not Sent' : agStat === 'SENT' ? 'Sent' : agStat === 'SIGNED' ? 'Signed' : agStat || '—';

  const makeGrid = (id, items) => {
    document.getElementById(id).innerHTML = items.map(i =>
      `<div class="data-item"><div class="dt">${i[0]}</div><div class="dd">${i[1]}</div></div>`
    ).join('');
  };

  makeGrid('agreementGrid', [
    ['Agreement Status', agStatDisplay],
    ['Sent At', g('agreementSentAt') ? new Date(g('agreementSentAt')).toLocaleString() : '—'],
    ['Received At', g('agreementReceivedAt') ? new Date(g('agreementReceivedAt')).toLocaleString() : '—'],
    ['Signed By', d('agreementSignedName')],
  ]);

  if (g('agreementLink')) {
    document.getElementById('agreementLinkWrap').style.display = 'block';
    document.getElementById('agreementLink').href = g('agreementLink');
  }

  const bal = parseFloat(String(g('currentBalance')).replace(/[$,]/g, '')) || 0;
  const down = parseFloat(String(g('repaymentDownPayment')).replace(/[$,]/g, '')) || 0;
  const monthly = parseFloat(String(g('repaymentMonthlyPayment')).replace(/[$,]/g, '')) || 0;
  const months = parseInt(String(g('repaymentMonths')).trim(), 10) || 0;
  const tbody = document.getElementById('breakdownBody');

  let rows = '';
  rows += `<tr><td>Current Balance</td><td style="text-align:right">${bal ? '$' + bal.toFixed(2) : '—'}</td></tr>`;
  if (down > 0) rows += `<tr><td>Down Payment</td><td style="text-align:right">−$${down.toFixed(2)}</td></tr>`;
  if (monthly > 0 && months > 0) rows += `<tr><td>Monthly (${months} × $${monthly.toFixed(2)})</td><td style="text-align:right">$${(monthly * months).toFixed(2)}</td></tr>`;
  const remaining = bal - down;
  rows += `<tr><td>Remaining After Down Payment</td><td style="text-align:right">${remaining > 0 ? '$' + remaining.toFixed(2) : '—'}</td></tr>`;
  tbody.innerHTML = rows;

  const eligible = isTrue('arrangementEligible');
  const maxMo = parseInt(String(g('arrangementMaxMonths')).trim(), 10) || 0;
  const minDown = parseFloat(String(g('arrangementMinDownPayment')).replace(/[$,]/g, '')) || 0;
  const planDiv = document.getElementById('planOptions');

  if (eligible && maxMo > 0 && bal > 0) {
    let html = '';
    const step = Math.max(1, Math.floor(maxMo / 3));
    for (let m = Math.max(1, Math.ceil(maxMo / 3)); m <= maxMo; m += step) {
      const afterDown = bal - minDown;
      const mp = afterDown > 0 ? (afterDown / m).toFixed(2) : '0.00';
      const isCurrent = m === months;
      html += `<div class="plan-option ${isCurrent ? 'active-plan' : ''}">
        <div class="plan-title">${m}-Month Plan ${isCurrent ? '<span class="badge badge-safe">Current</span>' : ''}</div>
        <div class="plan-detail">Down payment: $${minDown.toFixed(2)} · Monthly: $${mp} × ${m} months</div>
      </div>`;
    }
    if (months > 0) {
      const afterDown = bal - down;
      const mp = afterDown > 0 ? (afterDown / months).toFixed(2) : '0.00';
      html = `<div class="plan-option active-plan">
        <div class="plan-title">${months}-Month Plan <span class="badge badge-safe">Current</span></div>
        <div class="plan-detail">Down payment: $${down.toFixed(2)} · Monthly: $${monthly.toFixed(2) || mp} × ${months} months</div>
      </div>` + html;
    }
    planDiv.innerHTML = html;
  } else if (!eligible) {
    const reason = g('arrangementIneligibleReason');
    planDiv.innerHTML = `<div class="notes-box" style="border-left-color:var(--terracotta);">⚠ Customer is <b>not eligible</b> for arrangement plans.${reason ? '<br>Reason: ' + reason : ''}</div>`;
  } else {
    planDiv.innerHTML = `<div class="notes-box">No repayment plan options are currently available.</div>`;
  }

  const notes = [
    g('notes'),
    g('arrangementIneligibleReason') ? 'Ineligible Reason: ' + g('arrangementIneligibleReason') : ''
  ].filter(Boolean).join('\n') || '—';
  document.getElementById('notesBox').textContent = notes;

  const eligDiv = document.getElementById('eligBody');
  const eligItems = [];
  eligItems.push(`<div style="margin-bottom:8px;"><span class="badge ${eligible ? 'badge-safe' : 'badge-danger'}">${eligible ? '✓ Eligible' : '✗ Not Eligible'}</span></div>`);
  if (maxMo > 0) eligItems.push(`<div class="info-row"><span class="lbl">Max Months</span><span class="val">${maxMo}</span></div>`);
  if (minDown > 0) eligItems.push(`<div class="info-row"><span class="lbl">Min Down</span><span class="val">$${minDown.toFixed(2)}</span></div>`);
  eligDiv.innerHTML = eligItems.join('') || '<span style="color:var(--text-light);font-size:.85rem;">—</span>';

  const addr = [g('serviceAddress'), g('city'), g('state'), g('zip')].filter(Boolean).join(', ') || '—';
  document.getElementById('acctInfo').innerHTML = [
    ['Account #', accountId() || '—'],
    ['Name', d('customerName')],
    ['Address', addr],
    ['Status', status || '—'],
  ].map(i => `<div class="info-row"><span class="lbl">${i[0]}</span><span class="val">${i[1]}</span></div>`).join('');
</script>
