<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Utility Company — Repayment</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--brand:#00607a;--muted:#6c757d;--border:#e9eef2;--bg:#f7f9fb}
    body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);margin:18px;color:#222}
    .wrap{max-width:900px;margin:0 auto}
    .panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px}
    .header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--brand);padding-bottom:10px;margin-bottom:12px}
    .title{color:var(--brand);font-size:20px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .card{background:#fff;padding:12px;border-radius:8px;border:1px solid #eef3f6}
    .label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase}
    .value{font-size:16px;font-weight:800;margin-top:6px}
    .actions{display:flex;gap:10px;margin-top:14px}
    .btn{padding:10px 14px;border-radius:8px;background:var(--brand);color:#fff;text-decoration:none;font-weight:700}
    .btn.alt{background:#fff;border:1px solid #d7dde1;color:#222}
    .debug{margin-top:12px;background:#0b1220;color:#fff;padding:10px;border-radius:6px;font-family:monospace;font-size:12px;display:none}
    .toggle-debug{cursor:pointer;color:var(--brand);text-decoration:underline;font-size:13px;background:none;border:none;padding:0}
    @media (max-width:900px){.grid{grid-template-columns:1fr 1fr}}
    @media (max-width:520px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="header">
        <div>
          <h1 class="title">Repayment Plan</h1>
          <div style="color:var(--muted);font-size:13px">View or confirm repayment details</div>
        </div>
        <div id="loadStatus" style="color:var(--muted)">Loading…</div>
      </div>

      <div class="grid" style="margin-bottom:12px">
        <div class="card"><div class="label">Customer</div><div id="d-name" class="value">—</div></div>
        <div class="card"><div class="label">Account</div><div id="d-acc" class="value">—</div></div>
        <div class="card"><div class="label">Balance</div><div id="d-bal" class="value">$0.00</div></div>
        <div class="card"><div class="label">Status</div><div id="d-status" class="value">—</div></div>

        <div class="card"><div class="label">Months</div><div id="d-months" class="value">—</div></div>
        <div class="card"><div class="label">Down Payment</div><div id="d-down" class="value">—</div></div>
        <div class="card"><div class="label">Monthly Payment</div><div id="d-monthly" class="value">—</div></div>
        <div class="card"><div class="label">Confirm #</div><div id="d-conf" class="value">—</div></div>
      </div>

      <div class="actions">
        <a id="backBtn" class="btn alt">Back to Account</a>
        <a id="openAgent" class="btn">Open in Agent Script</a>
        <div style="flex:1"></div>
        <div style="color:var(--muted)">Data source: accounts.json (GitHub)</div>
      </div>

      <div style="margin-top:12px">
        <button class="toggle-debug" id="toggleDebug">Show debug info</button>
        <div id="debug" class="debug" aria-hidden="true"><pre id="debugText"></pre></div>
      </div>
    </div>
  </div>

  <script>
    (async function(){
      const dataUrl = 'https://astarrett.github.io/Demo-Scripts/data-actions/accounts.json';
      const params = new URLSearchParams(window.location.search);
      const acct = (params.get('accountNumber') || '').trim();

      const el = id => document.getElementById(id);
      const set = (id, v) => { const e = el(id); if(e) e.innerText = (v !== undefined && v !== null && v !== '') ? v : '—'; };

      function formatCurrency(v){
        if(v === undefined || v === null || v === '') return '—';
        const n = Number(String(v).replace(/[^0-9.-]/g,''));
        return isNaN(n) ? String(v) : n.toLocaleString(undefined,{style:'currency',currency:'USD'});
      }

      function pick(obj, keys){
        for(const k of keys){
          if(obj === null || obj === undefined) break;
          if(k in obj) return obj[k];
          const alt = k.charAt(0).toLowerCase() + k.slice(1);
          if(alt in obj) return obj[alt];
          const up = k.toUpperCase();
          if(up in obj) return obj[up];
        }
        return undefined;
      }

      // Debug UI
      const debug = el('debug'), debugText = el('debugText'), toggle = el('toggleDebug');
      toggle.addEventListener('click', ()=>{
        const showing = debug.style.display === 'block';
        debug.style.display = showing ? 'none' : 'block';
        debug.setAttribute('aria-hidden', showing ? 'true' : 'false');
        toggle.innerText = showing ? 'Show debug info' : 'Hide debug info';
      });

      try{
        const resp = await fetch(dataUrl, { cache: "no-store" });
        if(!resp.ok) throw new Error('Fetch failed: ' + resp.status);
        const all = await resp.json();
        el('loadStatus').innerText = 'Loaded';
        debugText.innerText = 'URL params:\n' + JSON.stringify(Object.fromEntries(params.entries()), null, 2) + '\n\nData keys count: ' + Object.keys(all||{}).length;

        if(!acct){
          set('d-name','No accountNumber in URL');
          return;
        }

        const rec = all[acct] || {};
        debugText.innerText += '\n\nLookup: ' + acct + '\nFound: ' + (Object.keys(rec).length ? 'yes' : 'no') + (Object.keys(rec).length ? '\n\n' + JSON.stringify(rec, null, 2) : '');

        // Prefer URL params for repayment-specific fields (AVA will pass these)
        const urlOrRec = (k) => {
          if(params.has(k) && params.get(k) !== null && params.get(k) !== '') return params.get(k);
          return pick(rec, [k, k.charAt(0).toLowerCase() + k.slice(1)]) || '';
        };

        set('d-name', urlOrRec('customerName') || pick(rec,['customerName','customer','customer_name']) || '—');
        set('d-acc', acct);
        set('d-bal', formatCurrency(urlOrRec('currentBalance') || pick(rec,['currentBalance','balance'])));
        set('d-status', urlOrRec('repaymentPlanStatus') || pick(rec,['repaymentPlanStatus','repaymentPlan','planStatus']) || 'None');

        const months = urlOrRec('repaymentMonths') || '';
        const down = urlOrRec('repaymentDownPayment') || '';
        const monthly = urlOrRec('repaymentMonthlyPayment') || '';
        const conf = urlOrRec('repaymentConfirmationNumber') || '';

        set('d-months', months || '—');
        set('d-down', down ? formatCurrency(down) : '—');
        set('d-monthly', monthly ? formatCurrency(monthly) : '—');
        set('d-conf', conf || '—');

        // Buttons
        el('backBtn').href = 'agent-script.html?accountNumber=' + encodeURIComponent(acct);
        el('openAgent').href = 'agent-script.html?accountNumber=' + encodeURIComponent(acct);

      }catch(err){
        console.error(err);
        el('loadStatus').innerText = 'Error loading';
        debugText.innerText += '\n\nERROR:\n' + (err && err.message ? err.message : String(err));
        debug.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
