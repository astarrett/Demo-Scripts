<script>
    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
    }

    function money(val, fallback) {
        if (!val && val !== 0 || val === '—') return fallback;
        const n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
        return isNaN(n) ? fallback : '$' + n.toFixed(2);
    }

    const params = window.location.search;

    // Common fields - checking both possible names for balance
    const name        = getParam('customerName')  || '—';
    const account     = getParam('accountNumber') || '—';
    const balanceRaw  = getParam('currentBalance') || getParam('balance') || '0.00';
    const risk        = getParam('shutOffRisk') || '—';
    const notes       = getParam('notes') || 'No notes available.';

    // Repayment fields
    const eligible    = getParam('arrangementEligible') || '—';
    const maxMonths   = getParam('arrangementMaxMonths') || '—';
    const minDown     = getParam('arrangementMinDownPayment') || '—';

    const months      = getParam('repaymentMonths') || '—';
    const downPay     = getParam('repaymentDownPayment') || '—';
    const monthlyPay  = getParam('repaymentMonthlyPayment') || '—';
    const startDate   = getParam('repaymentStartDate') || '—';

    const planStatus  = getParam('repaymentPlanStatus') || '—';
    const confirmNum  = getParam('repaymentConfirmationNumber') || '—';

    // Populate UI
    document.getElementById('display-name').innerText = name;
    document.getElementById('display-account').innerText = account;
    document.getElementById('display-balance').innerText = money(balanceRaw, '$0.00');
    document.getElementById('display-risk').innerText = risk;
    document.getElementById('display-notes').innerText = notes;

    document.getElementById('display-eligible').innerText = eligible;
    document.getElementById('display-max-months').innerText = maxMonths;
    document.getElementById('display-min-down').innerText = money(minDown, '$—');
    document.getElementById('display-months').innerText = months;
    document.getElementById('display-down').innerText = money(downPay, '$—');
    document.getElementById('display-monthly').innerText = money(monthlyPay, '$—');

    document.getElementById('display-plan-status').innerText = planStatus;
    document.getElementById('display-confirm').innerText = confirmNum;
    document.getElementById('display-start').innerText = startDate;

    // Navigation
    document.getElementById('btn-back').href = 'agent-script.html' + params;
    document.getElementById('btn-take-payment').href = 'take-payment.html' + params;
</script>
