<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repayment — City Utilities</title>

<style>
/* same styles as agent page */
</style>
</head>

<body>

<div class="topbar">City Utilities — Repayment</div>

<div class="wrap">

<div class="hero">
  <div class="hero-main" id="balance">—</div>
  <div>Account #<span id="acct"></span> · <span id="name"></span></div>

  <div class="nav-actions">
    <button class="nav-btn" onclick="goAgent()">Agent</button>
    <button class="nav-btn active">Repayment</button>
    <button class="nav-btn" onclick="goPayment()">Take Payment</button>
  </div>
</div>

<div class="layout">

<div>
<div class="card">
<div class="card-title">Repayment Details</div>
<div class="card-body">
<div class="row"><span>Eligible</span><span id="eligible"></span></div>
<div class="row"><span>Max Months</span><span id="months"></span></div>
<div class="row"><span>Monthly Payment</span><span id="monthly"></span></div>
</div>
</div>
</div>

<div>
<div class="card">
<div class="card-title">Summary</div>
<div class="card-body">
<div class="row"><span>Status</span><span id="status"></span></div>
</div>
</div>
</div>

</div>

</div>

<script>
const URL="https://raw.githubusercontent.com/astarrett/Demo-Scripts/main/data-actions/Utility-Accounts";
const p=new URLSearchParams(location.search);
const acct=p.get("accountNumber");

function goAgent(){
  location.href=`agent-script.html?accountNumber=${acct}`;
}
function goPayment(){
  location.href=`take-payment.html?accountNumber=${acct}`;
}

async function load(){
  const d=await fetch(URL).then(r=>r.json());
  const r=d[acct];

  if(!r)return;

  document.getElementById("acct").textContent=r.accountNumber;
  document.getElementById("name").textContent=r.customerName;
  document.getElementById("balance").textContent="$"+r.currentBalance;

  document.getElementById("eligible").textContent=r.arrangementEligible;
  document.getElementById("months").textContent=r.arrangementMaxMonths;
  document.getElementById("monthly").textContent=r.repaymentMonthlyPayment;
  document.getElementById("status").textContent=r.accountStatus;
}
load();
</script>

</body>
</html>
