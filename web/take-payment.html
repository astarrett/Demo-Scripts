<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Payment — City Utilities Department</title>

<style>
:root {
  --terracotta:#c2572a;
  --cream:#f5f0e6;
  --card:#ffffff;
  --teal:#4f8f95;
  --text:#2f2a24;
  --muted:#7a6f63;
  --border:#e6ded1;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--cream);
  color:var(--text);
}

.topbar {
  background:var(--terracotta);
  color:#fff;
  padding:16px 22px;
  font-weight:700;
}

.wrap { padding:16px; }

.hero {
  background:linear-gradient(135deg,var(--teal),#3d7479);
  color:#fff;
  border-radius:12px;
  padding:22px;
  margin-bottom:16px;
}

.hero-balance {
  font-size:36px;
  font-weight:700;
}

.nav-actions {
  margin-top:14px;
  display:flex;
  gap:10px;
}

.nav-btn {
  background:#fff;
  color:var(--terracotta);
  border:2px solid #fff;
  padding:10px 14px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
}

.card-title {
  padding:14px;
  font-weight:700;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.card-body {
  padding:16px;
}

.row {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}

.row:last-child { border:none; }

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topbar">City Utilities — Take Payment</div>

<div class="wrap">

  <div class="hero">
    <div class="hero-balance" id="balance">—</div>
    <div>Account #<span id="acct">—</span> · <span id="name">—</span></div>

    <div class="nav-actions">
      <button class="nav-btn" onclick="goAgent()">Agent</button>
      <button class="nav-btn" onclick="goRepayment()">Repayment</button>
    </div>
  </div>

  <div class="layout">

    <div>
      <div class="card">
        <div class="card-title">Payment Options</div>
        <div class="card-body">
          <div class="row"><span>Card</span><span>Available</span></div>
          <div class="row"><span>Bank (ACH)</span><span>Available</span></div>
          <div class="row"><span>Phone</span><span>Available</span></div>
          <div class="row"><span>Check</span><span id="checkStatus">—</span></div>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <div class="card-title">Last Payment</div>
        <div class="card-body">
          <div class="row"><span>Date</span><span id="lastDate">—</span></div>
          <div class="row"><span>Amount</span><span id="lastAmt">—</span></div>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-title">Summary</div>
        <div class="card-body">
          <div class="row"><span>Status</span><span id="status">—</span></div>
          <div class="row"><span>Balance</span><span id="sumBal">—</span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const DATA_URL="https://raw.githubusercontent.com/astarrett/Demo-Scripts/main/data-actions/Utility-Accounts";
const p=new URLSearchParams(window.location.search);

function acct(){return p.get("accountNumber")||"";}

function goAgent(){
  window.location.href="agent-script.html?accountNumber="+acct();
}

function goRepayment(){
  window.location.href="repayment-script.html?accountNumber="+acct();
}

async function load(){
  const id=acct();
  if(!id)return;

  const res=await fetch(DATA_URL);
  const data=await res.json();
  const r=data[id];

  if(!r)return;

  document.getElementById("balance").textContent="$"+r.currentBalance;
  document.getElementById("acct").textContent=r.accountNumber;
  document.getElementById("name").textContent=r.customerName;

  document.getElementById("status").textContent=r.accountStatus;
  document.getElementById("sumBal").textContent="$"+r.currentBalance;

  document.getElementById("lastDate").textContent=r.lastPaymentDate;
  document.getElementById("lastAmt").textContent="$"+r.lastPaymentAmount;

  document.getElementById("checkStatus").textContent=
    r.bouncedCheckLast6Month==="true" ? "Unavailable" : "Available";
}

load();
</script>

</body>
</html>
