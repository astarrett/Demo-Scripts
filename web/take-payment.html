<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Utility Company — Take Payment (Demo)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--teal:#007a8d;--muted:#6c757d;--border:#e9eef2}
    body{font-family:"Segoe UI",Arial,sans-serif;background:#f7f9fb;margin:18px;color:#222}
    .box{max-width:720px;margin:0 auto;background:#fff;border:1px solid var(--border);padding:18px;border-radius:10px}
    .label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase}
    .value{font-size:16px;font-weight:800;margin-top:6px}
    .row{display:flex;gap:12px;margin-top:12px}
    input[type="text"], input[type="number"]{padding:10px;border-radius:6px;border:1px solid #ddd;width:100%}
    .btn{padding:10px 14px;background:var(--teal);color:#fff;border-radius:8px;text-decoration:none;font-weight:800;border:0;cursor:pointer}
    .small{color:var(--muted);font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="box">
    <h2 style="color:var(--teal);margin:0 0 8px 0">Take Payment — Demo</h2>
    <div style="color:var(--muted);font-size:13px">This demo UI reads the account and allows entering a payment amount (no real processing).</div>

    <div style="margin-top:14px">
      <div class="label">Account</div>
      <div id="acc" class="value">—</div>
    </div>

    <div style="margin-top:12px">
      <div class="label">Name</div>
      <div id="nm" class="value">—</div>
    </div>

    <div class="row" style="margin-top:14px">
      <div style="flex:1">
        <div class="label">Payment Amount</div>
        <input id="amt" type="number" step="0.01" placeholder="e.g., 45.00" />
      </div>
      <div style="width:240px">
        <div class="label">Confirmation #</div>
        <input id="conf" type="text" placeholder="CONF12345" />
      </div>
    </div>

    <div style="margin-top:16px;display:flex;gap:12px;align-items:center">
      <button id="submitBtn" class="btn">Record Payment (Demo)</button>
      <div class="small">Note: demo only — no backend write</div>
    </div>

    <div id="result" style="margin-top:14px;color:var(--muted)"></div>
  </div>

  <script>
    (async function(){
      // Replace the whole rawUrls array (or candidates block) with this single constant:
const DATA_RAW_URL = 'https://raw.githubusercontent.com/astarrett/Demo-Scripts/main/data-actions/Utility-Accounts';
      const params = new URLSearchParams(window.location.search);
      const acct = (params.get('accountNumber') || '').trim();
      const el = id => document.getElementById(id);
      if(!acct){ el('acc').innerText = 'No accountNumber in URL'; return; }

      try {
        const r = await fetch(raw, {cache:'no-store'});
        if(!r.ok) throw new Error('Fetch failed '+r.status);
        const data = await r.json();
        const rec = data[acct] || {};
        el('acc').innerText = acct;
        el('nm').innerText = rec.customerName || rec.customer || '—';
      } catch(e){
        el('acc').innerText = acct;
        el('nm').innerText = 'Error loading';
      }

      el('submitBtn').addEventListener('click', ()=>{
        const a = el('amt').value;
        const c = el('conf').value || ('CONF' + Math.floor(Math.random()*90000+10000));
        el('result').innerText = `Recorded (demo): $${a || '0.00'} — Confirmation: ${c}`;
      });
    })();
  </script>
</body>
</html>
