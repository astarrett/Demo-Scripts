<script>
  const P = Object.fromEntries(new URLSearchParams(window.location.search));
  const g = (k) => P[k] || '';
  const accountId = () => g('accountNumber') || g('key') || '';
  const isTrue = (k) => String(g(k)).trim().toLowerCase() === 'true';
  const normStatus = () => String(g('accountStatus')).trim().toLowerCase().replace(/\s+/g, '');
  const money = (k) => {
    const raw = String(g(k)).replace(/[$,]/g, '').trim();
    const n = parseFloat(raw);
    return Number.isFinite(n) ? '$' + n.toFixed(2) : '—';
  };
  const d = (k, fmt) => {
    const v = g(k);
    if (!v) return '—';
    if (fmt === '$') return money(k);
    return v;
  };
  function qs() { return new URLSearchParams(P).toString(); }

  document.getElementById('nav-agent').href = 'agent-script.html?' + qs();
  document.getElementById('nav-repayment').href = 'repayment-script.html?' + qs();
  document.getElementById('nav-payment').href = 'take-payment.html?' + qs();
  document.getElementById('btn-agent').href = 'agent-script.html?' + qs();
  document.getElementById('btn-repayment').href = 'repayment-script.html?' + qs();

  document.getElementById('heroBalance').textContent = d('currentBalance', '$');
  document.getElementById('heroAcct').textContent = accountId() || '—';
  document.getElementById('heroName').textContent = d('customerName');

  const status = normStatus();
  const sEl = document.getElementById('heroStatus');
  if (status === 'finalnotice') { sEl.className = 'badge badge-danger'; sEl.textContent = 'Final Notice'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'pastdue') { sEl.className = 'badge badge-warn'; sEl.textContent = 'Past Due'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'disconnected') { sEl.className = 'badge badge-danger'; sEl.textContent = 'Disconnected'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'active') { sEl.className = 'badge badge-safe'; sEl.textContent = 'Active'; sEl.style.fontSize = '.95rem'; }
  else { sEl.textContent = status || '—'; }

  const alertArea = document.getElementById('alertsArea');
  let alerts = '';
  if (isTrue('bouncedCheckLast6Month')) {
    const count = g('bouncedCheckCountLast6Months') || '1';
    alerts += `<div class="alert-box alert-danger">⚠️ <div><b>Bounced Check Alert:</b> ${count} returned payment(s) in the last 6 months. Check payments may be restricted.</div></div>`;
  }
  if (status === 'disconnected') {
    alerts += `<div class="alert-box alert-danger">🔌 <div><b>Disconnected:</b> Service is currently disconnected. Payment may be required before reconnection.</div></div>`;
  }
  if (isTrue('shutOffRisk') && status !== 'disconnected') {
    alerts += `<div class="alert-box alert-warn">⚡ <div><b>Shut-Off Risk:</b> Account is at risk of disconnection. Encourage immediate payment.</div></div>`;
  }
  if (isTrue('hardshipFlag')) {
    alerts += `<div class="alert-box alert-info">🤝 <div><b>Hardship Flag:</b> Customer has been flagged for hardship assistance. Consider available programs.</div></div>`;
  }
  alertArea.innerHTML = alerts;

  function makeGrid(id, items) {
    document.getElementById(id).innerHTML = items.map(i => `<div class="data-item"><div class="dt">${i[0]}</div><div class="dd">${i[1]}</div></div>`).join('');
  }

  const addr = [g('serviceAddress'), g('city'), g('state'), g('zip')].filter(Boolean).join(', ') || '—';
  makeGrid('custGrid', [
    ['Account Number', accountId() || '—'],
    ['Customer Name', d('customerName')],
    ['Service Address', addr],
    ['Current Balance', d('currentBalance', '$')],
    ['Account Status', status ? (status === 'finalnotice' ? 'Final Notice' : status === 'pastdue' ? 'Past Due' : status.charAt(0).toUpperCase() + status.slice(1)) : '—'],
    ['Repayment Status', d('repaymentPlanStatus')],
  ]);

  const bouncedCheck = isTrue('bouncedCheckLast6Month');
  const isDisconnected = status === 'disconnected';
  const methods = [
    { icon: '💳', name: 'Credit/Debit Card', desc: 'Visa, MC, Amex, Discover', disabled: false },
    { icon: '🏦', name: 'Bank Transfer (ACH)', desc: 'Direct from bank account', disabled: false },
    { icon: '📱', name: 'Phone (IVR)', desc: 'Automated phone payment', disabled: false },
    { icon: '🔄', name: 'Auto-Pay Enrollment', desc: 'Set up recurring payments', disabled: isDisconnected },
    { icon: '✉️', name: 'Check by Mail', desc: 'Mail to payment center', disabled: bouncedCheck },
    { icon: '🏢', name: 'In-Person', desc: 'Walk-in payment center', disabled: false },
  ];
  document.getElementById('methodGrid').innerHTML = methods.map(m =>
    `<div class="method-card ${m.disabled ? 'disabled' : ''}">
      <div class="m-icon">${m.icon}</div>
      <div class="m-name">${m.name}</div>
      <div class="m-desc">${m.desc}</div>
    </div>`
  ).join('');

  makeGrid('lastPayGrid', [
    ['Last Payment Date', d('lastPaymentDate')],
    ['Last Payment Amount', d('lastPaymentAmount', '$')],
    ['Bounced Checks (6 mo)', d('bouncedCheckCountLast6Months')],
    ['Check Restriction', bouncedCheck ? '🚫 Yes — Returned payment history' : 'None'],
  ]);

  const notes = [
    g('notes'),
    g('arrangementIneligibleReason') ? 'Ineligible Reason: ' + g('arrangementIneligibleReason') : ''
  ].filter(Boolean).join('\n') || '—';
  document.getElementById('notesBox').textContent = notes;

  const bal = parseFloat(String(g('currentBalance')).replace(/[$,]/g, '')) || 0;
  const lastAmt = parseFloat(String(g('lastPaymentAmount')).replace(/[$,]/g, '')) || 0;
  document.getElementById('paySummary').innerHTML = [
    ['Balance Due', bal ? '$' + bal.toFixed(2) : '—'],
    ['Last Payment', lastAmt ? '$' + lastAmt.toFixed(2) : '—'],
    ['Last Paid On', d('lastPaymentDate')],
    ['Repayment Plan', d('repaymentPlanStatus')],
  ].map(i => `<div class="info-row"><span class="lbl">${i[0]}</span><span class="val">${i[1]}</span></div>`).join('');

  const flags = document.getElementById('flagsBody');
  const flagItems = [];
  if (isTrue('shutOffRisk')) flagItems.push('<span class="badge badge-danger">⚠ Shut-Off Risk</span>');
  if (isTrue('hardshipFlag')) flagItems.push('<span class="badge badge-warn">🚩 Hardship</span>');
  if (bouncedCheck) flagItems.push('<span class="badge badge-warn">↩ Bounced Check — No checks</span>');
  if (isDisconnected) flagItems.push('<span class="badge badge-danger">🔌 Disconnected</span>');
  flags.innerHTML = flagItems.length ? flagItems.map(f => '<div style="margin-bottom:8px;">' + f + '</div>').join('') : '<span style="color:var(--text-light);font-size:.85rem;">No flags</span>';
</script>
