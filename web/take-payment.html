<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Payment — City Utilities Department</title>
<style>
  :root {
    --terracotta: #C2572A;
    --terracotta-dark: #A04520;
    --tan: #D2B48C;
    --tan-light: #E8D5B7;
    --beige: #F5F0E6;
    --beige-dark: #EDE4D0;
    --blue: #5F9EA0;
    --blue-light: #87CEEB;
    --blue-pale: #D6EEF5;
    --blue-dark: #3D7A7C;
    --text-dark: #2C1A0E;
    --text-mid: #5C4A3A;
    --text-light: #8B7B6B;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(44,26,14,.08);
    --shadow-lg: 0 6px 24px rgba(44,26,14,.12);
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--beige); color: var(--text-dark); min-height: 100vh; }

  .topbar { background: linear-gradient(135deg, var(--terracotta), var(--terracotta-dark)); color: var(--white); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .topbar h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: .3px; }
  .topbar .nav-pills { display: flex; gap: 8px; }
  .topbar .nav-pills a { color: var(--white); text-decoration: none; padding: 6px 16px; border-radius: 20px; font-size: .82rem; font-weight: 500; background: rgba(255,255,255,.15); transition: background .2s; }
  .topbar .nav-pills a:hover { background: rgba(255,255,255,.3); }
  .topbar .nav-pills a.active { background: var(--white); color: var(--terracotta); }

  .layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .card-header { padding: 14px 20px; font-weight: 600; font-size: .88rem; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--beige-dark); color: var(--text-mid); display: flex; align-items: center; gap: 8px; }
  .card-header .icon { width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; font-size: .75rem; }
  .card-body { padding: 18px 20px; }

  .hero { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: var(--white); border-radius: var(--radius); padding: 24px 28px; margin-bottom: 20px; box-shadow: var(--shadow-lg); }
  .hero .label { font-size: .78rem; text-transform: uppercase; letter-spacing: 1px; opacity: .85; margin-bottom: 4px; }
  .hero .balance { font-size: 2.4rem; font-weight: 700; }
  .hero .sub { font-size: .82rem; opacity: .8; margin-top: 6px; }
  .hero-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 600; }
  .badge-danger { background: #FDECEA; color: #B71C1C; }
  .badge-safe { background: #E8F5E9; color: #2E7D32; }
  .badge-warn { background: #FFF3E0; color: #E65100; }
  .badge-info { background: var(--blue-pale); color: var(--blue-dark); }

  .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .data-item .dt { font-size: .72rem; text-transform: uppercase; letter-spacing: .7px; color: var(--text-light); margin-bottom: 3px; }
  .data-item .dd { font-size: .95rem; font-weight: 600; color: var(--text-dark); word-break: break-word; }

  .notes-box { background: var(--beige); border-left: 4px solid var(--tan); border-radius: 0 8px 8px 0; padding: 14px 18px; font-size: .88rem; color: var(--text-mid); line-height: 1.55; white-space: pre-wrap; }

  /* Payment method cards */
  .method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .method-card { border: 2px solid var(--beige-dark); border-radius: 10px; padding: 18px 16px; text-align: center; transition: all .2s; }
  .method-card:hover { border-color: var(--blue); background: var(--blue-pale); }
  .method-card .m-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .method-card .m-name { font-weight: 700; font-size: .9rem; margin-bottom: 4px; }
  .method-card .m-desc { font-size: .76rem; color: var(--text-light); }
  .method-card.disabled { opacity: .45; pointer-events: none; }
  .method-card.disabled .m-name::after { content: ' (Unavailable)'; font-weight: 400; font-size: .72rem; color: var(--text-light); }

  /* Payment history mini-table */
  .pay-table { width: 100%; border-collapse: collapse; }
  .pay-table th { text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .6px; color: var(--text-light); padding: 8px 12px; border-bottom: 2px solid var(--beige-dark); }
  .pay-table td { padding: 10px 12px; border-bottom: 1px solid var(--beige); font-size: .9rem; }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .sidebar .card-body { padding: 14px 16px; }
  .action-btn { display: block; width: 100%; padding: 11px 14px; border: none; border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer; text-align: left; transition: all .2s; margin-bottom: 8px; text-decoration: none; }
  .action-btn:last-child { margin-bottom: 0; }
  .action-btn.primary { background: var(--terracotta); color: var(--white); }
  .action-btn.primary:hover { background: var(--terracotta-dark); }
  .action-btn.secondary { background: var(--blue-pale); color: var(--blue-dark); }
  .action-btn.secondary:hover { background: #c0e4ef; }
  .action-btn.outline { background: transparent; color: var(--terracotta); border: 1.5px solid var(--tan); }
  .action-btn.outline:hover { background: var(--tan-light); }

  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--beige-dark); font-size: .84rem; }
  .info-row:last-child { border-bottom: none; }
  .info-row .lbl { color: var(--text-light); }
  .info-row .val { font-weight: 600; }

  .alert-box { border-radius: 8px; padding: 12px 16px; font-size: .85rem; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; line-height: 1.5; }
  .alert-warn { background: #FFF3E0; border: 1px solid #FFE0B2; color: #E65100; }
  .alert-danger { background: #FDECEA; border: 1px solid #F5C6CB; color: #B71C1C; }
  .alert-info { background: var(--blue-pale); border: 1px solid #B3E0EC; color: var(--blue-dark); }
</style>
</head>
<body>

<div class="topbar">
  <h1>💰 Santa Fe Utility — Take Payment</h1>
  <nav class="nav-pills">
    <a href="#" id="nav-agent">Agent Script</a>
    <a href="#" id="nav-repayment">Repayment</a>
    <a href="#" class="active" id="nav-payment">Take Payment</a>
  </nav>
</div>

<div class="layout">
  <div class="main">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-row">
        <div>
          <div class="label">Amount Due</div>
          <div class="balance" id="heroBalance">—</div>
          <div class="sub">Account #<span id="heroAcct">—</span> · <span id="heroName">—</span></div>
        </div>
        <div style="text-align:right;">
          <div class="label">Account Status</div>
          <div id="heroStatus" class="badge badge-info" style="font-size:.95rem;">—</div>
        </div>
      </div>
    </div>

    <!-- Alerts -->
    <div id="alertsArea"></div>

    <!-- Customer & Balance -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="icon" style="background:var(--tan-light);color:var(--terracotta);">👤</span> Customer &amp; Balance</div>
      <div class="card-body">
        <div class="data-grid" id="custGrid"></div>
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="icon" style="background:var(--blue-pale);color:var(--blue-dark);">💳</span> Payment Methods</div>
      <div class="card-body">
        <div class="method-grid" id="methodGrid"></div>
      </div>
    </div>

    <!-- Last Payment Info -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="icon" style="background:var(--tan-light);color:var(--terracotta);">🕐</span> Last Payment Information</div>
      <div class="card-body">
        <div class="data-grid" id="lastPayGrid"></div>
      </div>
    </div>

    <!-- Payment History Notes -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header"><span class="icon" style="background:var(--blue-pale);color:var(--blue-dark);">📝</span> Payment History &amp; Notes</div>
      <div class="card-body">
        <div class="notes-box" id="notesBox">—</div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="card">
      <div class="card-header">Quick Actions</div>
      <div class="card-body">
        <a class="action-btn primary" id="btn-agent">🏠 Agent Dashboard</a>
        <a class="action-btn secondary" id="btn-repayment">📋 Repayment Info</a>
        <button class="action-btn outline" onclick="window.print()">🖨️ Print Receipt</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Payment Summary</div>
      <div class="card-body" id="paySummary"></div>
    </div>

    <div class="card">
      <div class="card-header">Flags &amp; Warnings</div>
      <div class="card-body" id="flagsBody"></div>
    </div>
  </div>
</div>

<script>
  const P = Object.fromEntries(new URLSearchParams(window.location.search));
  const g = (k) => P[k] || '';
  const d = (k, fmt) => { const v = g(k); if (!v) return '—'; if (fmt === '$') return '$' + parseFloat(v).toFixed(2); return v; };
  function qs() { return new URLSearchParams(P).toString(); }

  // Navigation
  document.getElementById('nav-agent').href = 'agent-script.html?' + qs();
  document.getElementById('nav-repayment').href = 'repayment-script.html?' + qs();
  document.getElementById('nav-payment').href = 'take-payment-script.html?' + qs();
  document.getElementById('btn-agent').href = 'agent-script.html?' + qs();
  document.getElementById('btn-repayment').href = 'repayment-script.html?' + qs();

  // Hero
  document.getElementById('heroBalance').textContent = d('currentBalance', '$');
  document.getElementById('heroAcct').textContent = d('key');
  document.getElementById('heroName').textContent = d('customerName');
  const status = g('accountStatus');
  const sEl = document.getElementById('heroStatus');
  if (status === 'finalNotice') { sEl.className = 'badge badge-danger'; sEl.textContent = 'Final Notice'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'pastDue') { sEl.className = 'badge badge-warn'; sEl.textContent = 'Past Due'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'disconnected') { sEl.className = 'badge badge-danger'; sEl.textContent = 'Disconnected'; sEl.style.fontSize = '.95rem'; }
  else if (status === 'active') { sEl.className = 'badge badge-safe'; sEl.textContent = 'Active'; sEl.style.fontSize = '.95rem'; }
  else { sEl.textContent = status || '—'; }

  // Alerts
  const alertArea = document.getElementById('alertsArea');
  let alerts = '';
  if (g('bouncedCheckLast6Month') === 'True') {
    const count = g('bouncedCheckCountLast6Months') || '1';
    alerts += `<div class="alert-box alert-danger">⚠️ <div><b>Bounced Check Alert:</b> ${count} returned payment(s) in the last 6 months. Check payments may be restricted.</div></div>`;
  }
  if (status === 'disconnected') {
    alerts += `<div class="alert-box alert-danger">🔌 <div><b>Disconnected:</b> Service is currently disconnected. Payment may be required before reconnection.</div></div>`;
  }
  if (g('shutOffRisk') === 'True' && status !== 'disconnected') {
    alerts += `<div class="alert-box alert-warn">⚡ <div><b>Shut-Off Risk:</b> Account is at risk of disconnection. Encourage immediate payment.</div></div>`;
  }
  if (g('hardshipFlag') === 'True') {
    alerts += `<div class="alert-box alert-info">🤝 <div><b>Hardship Flag:</b> Customer has been flagged for hardship assistance. Consider available programs.</div></div>`;
  }
  alertArea.innerHTML = alerts;

  // Customer grid
  function makeGrid(id, items) {
    document.getElementById(id).innerHTML = items.map(i => `<div class="data-item"><div class="dt">${i[0]}</div><div class="dd">${i[1]}</div></div>`).join('');
  }
  const addr = [g('serviceAddress'), g('city'), g('state'), g('zip')].filter(Boolean).join(', ') || '—';
  makeGrid('custGrid', [
    ['Account Number', d('key')],
    ['Customer Name', d('customerName')],
    ['Service Address', addr],
    ['Current Balance', d('currentBalance', '$')],
    ['Account Status', status ? (status === 'finalNotice' ? 'Final Notice' : status === 'pastDue' ? 'Past Due' : status.charAt(0).toUpperCase() + status.slice(1)) : '—'],
    ['Repayment Status', d('repaymentPlanStatus')],
  ]);

  // Payment methods
  const bouncedCheck = g('bouncedCheckLast6Month') === 'True';
  const isDisconnected = status === 'disconnected';
  const methods = [
    { icon: '💳', name: 'Credit/Debit Card', desc: 'Visa, MC, Amex, Discover', disabled: false },
    { icon: '🏦', name: 'Bank Transfer (ACH)', desc: 'Direct from bank account', disabled: false },
    { icon: '📱', name: 'Phone (IVR)', desc: 'Automated phone payment', disabled: false },
    { icon: '🔄', name: 'Auto-Pay Enrollment', desc: 'Set up recurring payments', disabled: isDisconnected },
    { icon: '✉️', name: 'Check by Mail', desc: 'Mail to payment center', disabled: bouncedCheck },
    { icon: '🏢', name: 'In-Person', desc: 'Walk-in payment center', disabled: false },
  ];
  document.getElementById('methodGrid').innerHTML = methods.map(m =>
    `<div class="method-card ${m.disabled ? 'disabled' : ''}">
      <div class="m-icon">${m.icon}</div>
      <div class="m-name">${m.name}</div>
      <div class="m-desc">${m.desc}</div>
    </div>`
  ).join('');

  // Last payment
  makeGrid('lastPayGrid', [
    ['Last Payment Date', d('lastPaymentDate')],
    ['Last Payment Amount', d('lastPaymentAmount', '$')],
    ['Bounced Checks (6 mo)', d('bouncedCheckCountLast6Months')],
    ['Check Restriction', bouncedCheck ? '🚫 Yes — Returned payment history' : 'None'],
  ]);

  // Notes
  const notes = [g('notes'), g('arrangementIneligibleReason') ? 'Ineligible Reason: ' + g('arrangementIneligibleReason') : ''].filter(Boolean).join('\n') || '—';
  document.getElementById('notesBox').textContent = notes;

  // Sidebar payment summary
  const bal = parseFloat(g('currentBalance')) || 0;
  const lastAmt = parseFloat(g('lastPaymentAmount')) || 0;
  document.getElementById('paySummary').innerHTML = [
    ['Balance Due', bal ? '$' + bal.toFixed(2) : '—'],
    ['Last Payment', lastAmt ? '$' + lastAmt.toFixed(2) : '—'],
    ['Last Paid On', d('lastPaymentDate')],
    ['Repayment Plan', d('repaymentPlanStatus')],
  ].map(i => `<div class="info-row"><span class="lbl">${i[0]}</span><span class="val">${i[1]}</span></div>`).join('');

  // Flags
  const flags = document.getElementById('flagsBody');
  const flagItems = [];
  if (g('shutOffRisk') === 'True') flagItems.push('<span class="badge badge-danger">⚠ Shut-Off Risk</span>');
  if (g('hardshipFlag') === 'True') flagItems.push('<span class="badge badge-warn">🚩 Hardship</span>');
  if (bouncedCheck) flagItems.push('<span class="badge badge-warn">↩ Bounced Check — No checks</span>');
  if (isDisconnected) flagItems.push('<span class="badge badge-danger">🔌 Disconnected</span>');
  flags.innerHTML = flagItems.length ? flagItems.map(f => '<div style="margin-bottom:8px;">'+f+'</div>').join('') : '<span style="color:var(--text-light);font-size:.85rem;">No flags</span>';
</script>
</body>
</html>
