<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Santa Fe Utility - Agent Script</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root { --sf-teal:#007a8d; --sf-red:#d9534f; --sf-green:#28a745; --muted:#6c757d; --border:#e9ecef; }
    body { font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial; margin:20px; color:#333; background:#fafafa; }
    .panel { max-width:1000px; margin:0 auto; background:#fff; border:1px solid var(--border); border-radius:8px; padding:18px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
    .header { display:flex; justify-content:space-between; align-items:center; border-bottom:3px solid var(--sf-teal); padding-bottom:10px; margin-bottom:16px; }
    .title { font-size:20px; color:var(--sf-teal); margin:0; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px; }
    .card { background:#fff; border:1px solid #f1f1f1; padding:12px; border-radius:6px; }
    .label { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; }
    .value { font-size:16px; font-weight:700; margin-top:6px; color:#222; word-break:break-word; }
    .row { display:flex; gap:12px; margin-bottom:12px; }
    .map { border-radius:6px; overflow:hidden; border:1px solid #ececec; height:260px; }
    .actions { margin-top:14px; display:flex; gap:10px; }
    .btn { padding:10px 14px; background:var(--sf-teal); color:#fff; text-decoration:none; border-radius:6px; font-weight:700; }
    .btn.secondary { background:#f7f7f7; color:#333; border:1px solid #ddd; }
    .muted { color:var(--muted); font-size:13px; }
    .small { font-size:13px; color:#555; }
    @media (max-width:700px) { .grid { grid-template-columns:1fr; } .row { flex-direction:column; } }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <h1 class="title">Santa Fe Utility — Account</h1>
      <div class="small" id="load-status">Loading…</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Customer</div>
        <div id="name" class="value">—</div>
        <div class="small muted" id="notes">—</div>
      </div>

      <div class="card">
        <div class="label">Account #</div>
        <div id="account" class="value">—</div>

        <div style="margin-top:10px">
          <span class="label">Status</span>
          <div id="status" class="value" style="font-size:14px; font-weight:700">—</div>
        </div>
      </div>

      <div class="card">
        <div class="label">Balance</div>
        <div id="balance" class="value">$0.00</div>

        <div style="margin-top:10px">
          <span class="label">Last Payment</span>
          <div id="lastPay" class="value" style="font-size:14px; font-weight:700">—</div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="card" style="flex:1">
        <div class="label">Service Address</div>
        <div id="address" class="value">—</div>
        <div class="small muted" id="citystatezip">—</div>
      </div>

      <div class="card" style="width:320px">
        <div class="label">Current Grid Status</div>
        <div id="grid-status" class="value">—</div>

        <div style="margin-top:10px">
          <div class="label">Repayment Plan</div>
          <div id="repaymentPlan" class="value">—</div>
        </div>
      </div>
    </div>

    <div class="map" id="mapContainer" aria-hidden="false">
      <!-- Map iframe inserted dynamically -->
    </div>

    <div class="actions">
      <a id="openRepayment" class="btn">Open Repayment Script</a>
      <a id="refresh" class="btn secondary">Refresh</a>
      <div style="flex:1"></div>
      <div class="muted">Data source: accounts.json (GitHub)</div>
    </div>
  </div>

  <script>
    (async function(){
      const dataUrl = '/Demo-Scripts/data-actions/accounts.json'; // relative to GH pages root
      // If using raw.githubusercontent or custom domain, replace the path accordingly:
      // const dataUrl = 'https://astarrett.github.io/Demo-Scripts/data-actions/accounts.json';
      const params = new URLSearchParams(window.location.search);
      const acct = (params.get('accountNumber') || '').trim();

      const setText = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val ?? '—'; };

      function currency(v){
        if(!v) return '—';
        // allow numbers or already formatted strings
        const n = Number(String(v).replace(/[^0-9.-]/g,'')); 
        return isNaN(n) ? String(v) : n.toLocaleString(undefined, {style:'currency', currency:'USD'});
      }

      try {
        const res = await fetch(dataUrl);
        if(!res.ok) throw new Error('Fetch failed ' + res.status);
        const all = await res.json();

        setText('load-status','Loaded');

        if(!acct){
          setText('name','No account number passed');
          setText('account','—');
          setText('balance','—');
          setText('status','—');
          return;
        }

        const rec = all[acct];
        if(!rec){
          setText('name','Account not found');
          setText('account',acct);
          setText('balance','—');
          setText('status','—');
          return;
        }

        // Populate fields
        setText('name', rec.customerName || '—');
        setText('account', acct);
        setText('balance', currency(rec.currentBalance));
        setText('status', rec.accountStatus || rec.repaymentPlanStatus || '—');
        setText('lastPay', (rec.lastPaymentAmount ? currency(rec.lastPaymentAmount) : '—') + ' • ' + (rec.lastPaymentDate || '—'));
        setText('address', rec.serviceAddress || '—');
        setText('citystatezip', [rec.city, rec.state, rec.zip].filter(Boolean).join(', '));
        setText('notes', rec.notes || ' ');
        setText('grid-status', rec.shutoffRisk === 'true' || rec.shutOffRisk === 'true' ? 'At Risk' : 'Normal');
        setText('repaymentPlan', rec.repaymentPlanStatus || 'None');

        // Map: use OpenStreetMap embed centered near Santa Fe; if address geocoding available later, replace marker coords dynamically
        // Center set to Santa Fe lat/lon; zoomed closer for city-area view
        const lat = rec.latitude || '35.6870';
        const lon = rec.longitude || '-105.9378';
        const zoom = 13;
        const bboxSize = 0.03; // small bbox for zoom
        const left = (parseFloat(lon) - bboxSize).toFixed(6);
        const right = (parseFloat(lon) + bboxSize).toFixed(6);
        const top = (parseFloat(lat) + bboxSize).toFixed(6);
        const bottom = (parseFloat(lat) - bboxSize).toFixed(6);
        const iframeSrc = `https://www.openstreetmap.org/export/embed.html?bbox=${left},${bottom},${right},${top}&layer=mapnik&marker=${lat},${lon}`;
        document.getElementById('mapContainer').innerHTML = '<iframe width="100%" height="100%" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="'+iframeSrc+'"></iframe>';

        // Build link to repayment page (pass accountNumber only - repayment fields will be filled later by AVA)
        const repUrl = 'agent-script.html'.replace('agent-script.html','repayment-script.html') + '?accountNumber=' + encodeURIComponent(acct);
        document.getElementById('openRepayment').href = repUrl;

      } catch (err) {
        console.error(err);
        setText('load-status','Error loading data');
      }

      // Refresh button
      document.getElementById('refresh').addEventListener('click', ()=> location.reload());
    })();
  </script>
</body>
</html>
