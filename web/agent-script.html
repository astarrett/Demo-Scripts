<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Utility Company — Agent Script</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--teal:#007a8d;--red:#d9534f;--muted:#6c757d;--border:#e9eef2;--bg:#f7f9fb}
    html,body{height:100%;margin:0;font-family:"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:#222}
    .container{display:flex;height:100vh;gap:0}
    .left{flex:1;padding:26px 28px;overflow:auto}
    .right{width:360px;background:#fff;border-left:1px solid var(--border);padding:22px;display:flex;flex-direction:column}
    .title{color:var(--teal);font-size:22px;margin:0 0 6px 0;font-weight:800}
    .sub{color:var(--muted);font-size:13px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,0.02)}
    .label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.6px}
    .value{margin-top:8px;font-size:16px;font-weight:800}
    .big{font-size:24px;color:var(--teal)}
    .pill{display:inline-block;padding:6px 12px;border-radius:20px;color:#fff;font-weight:800;font-size:12px}
    .map{margin-top:18px;height:300px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#fafafa}
    .btn{display:block;width:100%;text-align:center;padding:12px;border-radius:8px;color:#fff;text-decoration:none;font-weight:800;background:var(--teal);margin-top:18px}
    .meta{margin-top:12px;color:var(--muted);font-size:12px}
    .debug{margin-top:14px;background:#0b1220;color:#cfe8ff;padding:10px;border-radius:8px;font-family:monospace;font-size:12px;display:none;white-space:pre-wrap;max-height:160px;overflow:auto}
    .toggle{background:transparent;border:0;color:var(--teal);text-decoration:underline;cursor:pointer;padding:0;font-size:13px;margin-top:8px}
    @media (max-width:980px){.right{width:320px}.map{height:260px}}
    @media (max-width:700px){.container{flex-direction:column}.right{width:100%;order:2}.left{order:1}}
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1 class="title">Customer Overview</h1>
      <div class="sub">Agent view — dynamic data from accounts JSON</div>

      <div class="grid">
        <div class="card">
          <div class="label">Customer</div>
          <div id="name" class="value">—</div>
          <div id="notes" style="margin-top:8px;color:var(--muted);font-weight:600">—</div>
        </div>

        <div class="card">
          <div class="label">Account #</div>
          <div id="account" class="value">—</div>
          <div style="margin-top:12px">
            <div class="label">Status</div>
            <div id="status" class="value" style="font-size:14px">—</div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:14px">
        <div class="label">Service Address</div>
        <div id="address" class="value">—</div>
      </div>

      <div class="card" style="height:360px; display:flex; flex-direction:column; justify-content:flex-start">
        <div class="label">Account Notes</div>
        <div id="notesLarge" style="margin-top:8px;color:var(--muted);font-weight:600">—</div>
        <div class="map" id="map"></div>
      </div>
    </div>

    <div class="right">
      <div style="flex:0 0 auto">
        <div class="label" style="margin-bottom:6px">Financial Summary</div>
        <div class="card" style="margin-bottom:12px">
          <div class="label">Current Balance</div>
          <div id="balance" class="value big">$0.00</div>
        </div>

        <div class="card" style="margin-bottom:12px">
          <div class="label">Last Payment</div>
          <div id="last" class="value">—</div>
        </div>

        <div class="label" style="margin-bottom:6px;margin-top:6px">Risk & Eligibility</div>
        <div class="card">
          <div class="label">Shut-off Risk</div>
          <div id="risk" class="value"><span id="riskPill" class="pill" style="background:var(--teal)">Checking...</span></div>
        </div>

        <a id="repayBtn" class="btn" href="#">Open Repayment Script</a>
        <div class="meta" id="sourceNote">Source: GitHub raw</div>
      </div>

      <button class="toggle" id="toggleDebug">Show debug</button>
      <div id="debug" class="debug" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    (async function(){
      const DATA_RAW_URL = 'https://raw.githubusercontent.com/astarrett/Demo-Scripts/main/data-actions/Utility-Accounts';

      const params = new URLSearchParams(window.location.search);
      const acct = (params.get('accountNumber') || '').trim();
      const el = id => document.getElementById(id);
      const set = (id, v) => { const e = el(id); if(e) e.innerText = (v === undefined || v === null || v === '') ? '—' : v; };

      function currency(v){
        if(v === undefined || v === null || v === '') return '—';
        const n = Number(String(v).replace(/[^0-9.-]/g,''));
        if(isNaN(n)) return String(v);
        return n.toLocaleString(undefined, {style:'currency', currency:'USD'});
      }

      const debug = el('debug'), toggle = el('toggleDebug');
      toggle.onclick = () => {
        const showing = debug.style.display === 'block';
        debug.style.display = showing ? 'none' : 'block';
        toggle.innerText = showing ? 'Show debug' : 'Hide debug';
      };

      if(!acct){
        set('name','No accountNumber in URL');
        return;
      }

      let rawText = null, data = null;
      try {
        const r = await fetch(DATA_RAW_URL, {cache: 'no-store'});
        rawText = await r.text();
        if(!r.ok) throw new Error('Fetch failed ' + r.status + ' ' + DATA_RAW_URL);
        data = JSON.parse(rawText);
        el('sourceNote').innerText = 'Source: ' + DATA_RAW_URL;
      } catch (err) {
        set('name','Error Loading Data');
        debug.innerText = 'ERROR:\n' + err.message + '\n\nRaw (truncated):\n' + (rawText ? rawText.substring(0,2000) : '(none)');
        debug.style.display = 'block';
        return;
      }

      const rec = data[acct] || null;
      if(!rec){
        debug.innerText = 'Account not found. Sample keys: ' + Object.keys(data).slice(0,20).join(', ');
        debug.style.display = 'block';
        set('name','Account Not Found');
        set('account', acct);
        return;
      }

      const pick = (o, keys) => {
        for(const k of keys){
          if(!o) break;
          if(k in o) return o[k];
          const alt = k.charAt(0).toLowerCase() + k.slice(1);
          if(alt in o) return o[alt];
        }
        return undefined;
      };

      set('name', pick(rec,['customerName','customer_name','customer']) || '—');
      set('account', acct);
      set('address', (pick(rec,['serviceAddress','service_address','address']) || '') );
      set('notes', pick(rec,['notes','note','AccountNotes']) || '—');
      set('notesLarge', pick(rec,['notes','note','AccountNotes']) || '—');
      set('balance', currency(pick(rec,['currentBalance','current_balance','balance'])));
      set('last', (pick(rec,['lastPaymentDate','last_payment_date']) || '—') + ' (' + (pick(rec,['lastPaymentAmount','last_payment_amount']) || '—') + ')');

      const riskVal = pick(rec,['shutoffRisk','shutOffRisk','shutoff_risk']);
      const riskPill = el('riskPill');
      if(riskVal === true || String(riskVal).toLowerCase() === 'true' || Number(riskVal) === 1){
        riskPill.innerText = 'HIGH RISK';
        riskPill.style.background = 'var(--red)';
      } else {
        riskPill.innerText = 'NORMAL';
        riskPill.style.background = 'var(--teal)';
      }

      const lat = pick(rec,['latitude','lat']) || '35.6870';
      const lon = pick(rec,['longitude','lon','lng']) || '-105.9378';
      const bbox = 0.012;
      const left = (parseFloat(lon) - bbox).toFixed(6);
      const right = (parseFloat(lon) + bbox).toFixed(6);
      const top = (parseFloat(lat) + bbox).toFixed(6);
      const bottom = (parseFloat(lat) - bbox).toFixed(6);
      el('map').innerHTML = `<iframe width="100%" height="100%" frameborder="0" scrolling="no" src="https://www.openstreetmap.org/export/embed.html?bbox=${left},${bottom},${right},${top}&layer=mapnik&marker=${lat},${lon}"></iframe>`;

      el('repayBtn').href = 'repayment-script.html?accountNumber=' + encodeURIComponent(acct);

      debug.innerText = 'Loaded record for ' + acct + '\nFields: ' + Object.keys(rec).join(', ');
    })();
  </script>
</body>
</html>
