<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard — City Utilities</title>

<style>
:root {
  --terracotta:#c2572a;
  --cream:#f5f0e6;
  --card:#ffffff;
  --teal:#4f8f95;
  --text:#2f2a24;
  --muted:#7a6f63;
  --border:#e6ded1;
}

body {
  margin:0;
  font-family:Arial,sans-serif;
  background:var(--cream);
}

.topbar {
  background:var(--terracotta);
  color:#fff;
  padding:16px;
  font-weight:700;
}

.wrap { padding:16px; }

.hero {
  background:linear-gradient(135deg,var(--teal),#3d7479);
  color:#fff;
  border-radius:12px;
  padding:20px;
  margin-bottom:16px;
}

.hero-main { font-size:34px; font-weight:700; }

.nav-actions { margin-top:14px; display:flex; gap:10px; }

.nav-btn {
  background:#fff;
  color:var(--terracotta);
  border:2px solid #fff;
  padding:10px;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

.nav-btn.active {
  background:var(--terracotta);
  color:#fff;
}

.layout {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:16px;
}

.card {
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
}

.card-title {
  padding:12px;
  font-weight:700;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.card-body { padding:16px; }

.row {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}

.row:last-child { border:none; }

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="topbar">City Utilities — Agent Dashboard</div>

<div class="wrap">

<div class="hero">
  <div class="hero-main" id="balance">—</div>
  <div>Account #<span id="acct"></span> · <span id="name"></span></div>

  <div class="nav-actions">
    <button class="nav-btn active">Agent</button>
    <button class="nav-btn" onclick="goRepayment()">Repayment</button>
    <button class="nav-btn" onclick="goPayment()">Take Payment</button>
  </div>
</div>

<div class="layout">

<div>
<div class="card">
<div class="card-title">Customer Info</div>
<div class="card-body">
<div class="row"><span>Name</span><span id="customerName"></span></div>
<div class="row"><span>Status</span><span id="status"></span></div>
<div class="row"><span>Balance</span><span id="bal"></span></div>
</div>
</div>

<div class="card" style="margin-top:16px;">
<div class="card-title">Notes</div>
<div class="card-body" id="notes"></div>
</div>
</div>

<div>
<div class="card">
<div class="card-title">Summary</div>
<div class="card-body">
<div class="row"><span>Last Payment</span><span id="lastPay"></span></div>
<div class="row"><span>Plan Status</span><span id="plan"></span></div>
</div>
</div>
</div>

</div>

</div>

<script>
const URL="https://raw.githubusercontent.com/astarrett/Demo-Scripts/main/data-actions/Utility-Accounts";
const p=new URLSearchParams(location.search);
const acct=p.get("accountNumber");

function goRepayment(){
  location.href=`repayment-script.html?accountNumber=${acct}`;
}
function goPayment(){
  location.href=`take-payment.html?accountNumber=${acct}`;
}

async function load(){
  const d=await fetch(URL).then(r=>r.json());
  const r=d[acct];

  if(!r)return;

  document.getElementById("acct").textContent=r.accountNumber;
  document.getElementById("name").textContent=r.customerName;
  document.getElementById("balance").textContent="$"+r.currentBalance;

  document.getElementById("customerName").textContent=r.customerName;
  document.getElementById("status").textContent=r.accountStatus;
  document.getElementById("bal").textContent="$"+r.currentBalance;

  document.getElementById("notes").textContent=r.notes;

  document.getElementById("lastPay").textContent=r.lastPaymentDate;
  document.getElementById("plan").textContent=r.repaymentPlanStatus;
}
load();
</script>

</body>
</html>
