<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard — City Utilities Department</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f0e6;
  margin: 0;
  padding: 0;
}

.header {
  background: #c2572a;
  color: white;
  padding: 16px;
  font-size: 20px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 16px;
}

.label {
  font-weight: bold;
  margin-bottom: 6px;
}

.value {
  margin-bottom: 12px;
}
</style>

</head>

<body>

<div class="header">
  City Utilities Department — Agent Dashboard
</div>

<div class="container">

  <div class="card">
    <div class="label">Account Number</div>
    <div class="value" id="accountNumber"></div>

    <div class="label">Customer Name</div>
    <div class="value" id="customerName"></div>

    <div class="label">Balance</div>
    <div class="value" id="currentBalance"></div>

    <div class="label">Status</div>
    <div class="value" id="accountStatus"></div>

    <div class="label">Service Address</div>
    <div class="value" id="serviceAddress"></div>

    <div class="label">City</div>
    <div class="value" id="city"></div>

    <div class="label">State</div>
    <div class="value" id="state"></div>

    <div class="label">ZIP</div>
    <div class="value" id="zip"></div>

    <div class="label">Notes</div>
    <div class="value" id="notes"></div>

    <div class="label">Shutoff Risk</div>
    <div class="value" id="shutOffRisk"></div>

    <div class="label">Hardship Flag</div>
    <div class="value" id="hardshipFlag"></div>

    <div class="label">Arrangement Eligible</div>
    <div class="value" id="arrangementEligible"></div>
  </div>

</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/astarrett/Demo-Scripts/refs/heads/main/data-actions/Utility-Accounts";

const params = new URLSearchParams(window.location.search);

function g(k) {
  return params.get(k) || "";
}

function set(id, val) {
  document.getElementById(id).textContent = (val !== undefined && val !== null && val !== "") ? val : "—";
}

function accountId() {
  return g("accountNumber") || g("key") || "";
}

async function loadAccount() {
  const acct = accountId();

  if (!acct) {
    set("accountNumber", "");
    return;
  }

  try {
    const resp = await fetch(DATA_URL);
    const data = await resp.json();

    // ✅ DIRECT LOOKUP (this fixes your issue)
    const record = data[acct];

    if (!record) {
      set("accountNumber", acct);
      set("customerName", "Account not found");
      return;
    }

    set("accountNumber", record.accountNumber || record.key || acct);
    set("customerName", record.customerName);
    set("currentBalance", record.currentBalance);
    set("accountStatus", record.accountStatus);
    set("serviceAddress", record.serviceAddress);
    set("city", record.city);
    set("state", record.state);
    set("zip", record.zip);
    set("notes", record.notes);
    set("shutOffRisk", record.shutOffRisk);
    set("hardshipFlag", record.hardshipFlag);
    set("arrangementEligible", record.arrangementEligible);

  } catch (e) {
    console.error(e);
    set("accountNumber", acct);
    set("customerName", "Error loading data");
  }
}

loadAccount();
</script>

</body>
</html>
