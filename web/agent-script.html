<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard — City Utilities Department</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f0e6;
  margin: 0;
  padding: 0;
}

.header {
  background: #c2572a;
  color: white;
  padding: 16px;
  font-size: 20px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 16px;
}

.label {
  font-weight: bold;
  margin-bottom: 6px;
}

.value {
  margin-bottom: 12px;
}
</style>

</head>

<body>

<div class="header">
  City Utilities Department — Agent Dashboard
</div>

<div class="container">

  <div class="card">
    <div class="label">Account Number</div>
    <div class="value" id="accountNumber"></div>

    <div class="label">Customer Name</div>
    <div class="value" id="customerName"></div>

    <div class="label">Balance</div>
    <div class="value" id="currentBalance"></div>

    <div class="label">Status</div>
    <div class="value" id="accountStatus"></div>

    <div class="label">Service Address</div>
    <div class="value" id="serviceAddress"></div>

    <div class="label">City</div>
    <div class="value" id="city"></div>

    <div class="label">State</div>
    <div class="value" id="state"></div>

    <div class="label">ZIP</div>
    <div class="value" id="zip"></div>

    <div class="label">Notes</div>
    <div class="value" id="notes"></div>

    <div class="label">Shutoff Risk</div>
    <div class="value" id="shutOffRisk"></div>

    <div class="label">Hardship Flag</div>
    <div class="value" id="hardshipFlag"></div>

    <div class="label">Arrangement Eligible</div>
    <div class="value" id="arrangementEligible"></div>

  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

function g(k) {
  return params.get(k) || "";
}

function set(id, val) {
  document.getElementById(id).textContent = val || "—";
}

set("accountNumber", g("accountNumber") || g("key"));
set("customerName", g("customerName"));
set("currentBalance", g("currentBalance"));
set("accountStatus", g("accountStatus"));
set("serviceAddress", g("serviceAddress"));
set("city", g("city"));
set("state", g("state"));
set("zip", g("zip"));
set("notes", g("notes"));
set("shutOffRisk", g("shutOffRisk"));
set("hardshipFlag", g("hardshipFlag"));
set("arrangementEligible", g("arrangementEligible"));
</script>

</body>
</html>
