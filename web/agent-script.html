<script>
  const P = Object.fromEntries(new URLSearchParams(window.location.search));
  const g = (k) => P[k] || '';
  const accountId = () => g('accountNumber') || g('key') || '';
  const isTrue = (k) => String(g(k)).trim().toLowerCase() === 'true';
  const normStatus = () => String(g('accountStatus')).trim().toLowerCase().replace(/\s+/g, '');
  const money = (k) => {
    const raw = String(g(k)).replace(/[$,]/g, '').trim();
    const n = parseFloat(raw);
    return Number.isFinite(n) ? '$' + n.toFixed(2) : '—';
  };
  const d = (k, fmt) => {
    const v = g(k);
    if (!v) return '—';
    if (fmt === '$') return money(k);
    return v;
  };
  function qs() { return new URLSearchParams(P).toString(); }

  document.getElementById('nav-agent').href = 'agent-script.html?' + qs();
  document.getElementById('nav-repayment').href = 'repayment-script.html?' + qs();
  document.getElementById('nav-payment').href = 'take-payment.html?' + qs();
  document.getElementById('btn-repayment').href = 'repayment-script.html?' + qs();
  document.getElementById('btn-payment').href = 'take-payment.html?' + qs();

  document.getElementById('heroBalance').textContent = d('currentBalance', '$');
  document.getElementById('heroAcct').textContent = accountId() || '—';

  const status = normStatus();
  const statusEl = document.getElementById('heroStatus');
  statusEl.textContent = status || '—';
  if (status === 'finalnotice') { statusEl.className = 'badge badge-danger'; statusEl.textContent = 'Final Notice'; }
  else if (status === 'pastdue') { statusEl.className = 'badge badge-warn'; statusEl.textContent = 'Past Due'; }
  else if (status === 'disconnected') { statusEl.className = 'badge badge-danger'; statusEl.textContent = 'Disconnected'; }
  else if (status === 'active') { statusEl.className = 'badge badge-safe'; statusEl.textContent = 'Active'; }

  const riskEl = document.getElementById('heroRisk');
  if (isTrue('shutOffRisk')) {
    riskEl.className = 'badge badge-danger';
    riskEl.textContent = '⚠ HIGH RISK';
    riskEl.style.fontSize = '.95rem';
  } else if (String(g('shutOffRisk')).trim().toLowerCase() === 'false') {
    riskEl.className = 'badge badge-safe';
    riskEl.textContent = '✓ Low Risk';
    riskEl.style.fontSize = '.95rem';
  } else {
    riskEl.textContent = '—';
  }

  const hardshipEl = document.getElementById('heroHardship');
  hardshipEl.textContent = isTrue('hardshipFlag') ? 'Yes' : (String(g('hardshipFlag')).trim().toLowerCase() === 'false' ? 'No' : '—');

  const makeGrid = (id, items) => {
    document.getElementById(id).innerHTML = items.map(i =>
      `<div class="data-item"><div class="dt">${i[0]}</div><div class="dd">${i[1]}</div></div>`
    ).join('');
  };

  const fullAddr = [g('serviceAddress'), g('city'), g('state'), g('zip')].filter(Boolean).join(', ') || '—';

  makeGrid('custGrid', [
    ['Account Number', accountId() || '—'],
    ['Customer Name', d('customerName')],
    ['Service Address', fullAddr],
    ['Current Balance', d('currentBalance', '$')],
    ['Account Status', status ? (status === 'finalnotice' ? 'Final Notice' : status === 'pastdue' ? 'Past Due' : status.charAt(0).toUpperCase() + status.slice(1)) : '—'],
    ['Hardship Flag', isTrue('hardshipFlag') ? '🚩 Yes' : (String(g('hardshipFlag')).trim().toLowerCase() === 'false' ? 'No' : '—')],
    ['Bounced Checks (6 mo)', d('bouncedCheckCountLast6Months')],
  ]);

  const notesText = [
    g('notes'),
    g('arrangementIneligibleReason') ? 'Ineligible Reason: ' + g('arrangementIneligibleReason') : ''
  ].filter(Boolean).join('\n') || '—';
  document.getElementById('notesBox').textContent = notesText;

  const snap = document.getElementById('snapshotBody');
  const snapItems = [
    ['Balance', d('currentBalance', '$')],
    ['Last Payment', d('lastPaymentAmount', '$')],
    ['Last Paid', d('lastPaymentDate')],
    ['Status', status ? status.replace(/([A-Z])/g, ' $1').trim() : '—'],
  ];
  snap.innerHTML = snapItems.map(i => `<div class="info-row"><span class="lbl">${i[0]}</span><span class="val">${i[1]}</span></div>`).join('');

  const flags = document.getElementById('flagsBody');
  const flagItems = [];
  if (isTrue('shutOffRisk')) flagItems.push('<span class="badge badge-danger">⚠ Shut-Off Risk</span>');
  if (isTrue('hardshipFlag')) flagItems.push('<span class="badge badge-warn">🚩 Hardship</span>');
  if (isTrue('bouncedCheckLast6Month')) flagItems.push('<span class="badge badge-warn">↩ Bounced Check</span>');
  if (isTrue('arrangementEligible')) flagItems.push('<span class="badge badge-safe">✓ Arrangement Eligible</span>');
  if (String(g('arrangementEligible')).trim().toLowerCase() === 'false') flagItems.push('<span class="badge badge-danger">✗ Not Eligible</span>');
  flags.innerHTML = flagItems.length ? flagItems.map(f => '<div style="margin-bottom:8px;">' + f + '</div>').join('') : '<span style="color:var(--text-light);font-size:.85rem;">No flags</span>';

  const map = L.map('map').setView([35.0844, -106.6504], 12);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  if (fullAddr && fullAddr !== '—') {
    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(fullAddr))
      .then(r => r.json())
      .then(data => {
        if (data && data.length) {
          const lat = parseFloat(data[0].lat), lon = parseFloat(data[0].lon);
          map.setView([lat, lon], 15);
          L.marker([lat, lon]).addTo(map).bindPopup('<b>' + d('customerName') + '</b><br>' + fullAddr).openPopup();
        }
      })
      .catch(() => {});
  }
</script>
